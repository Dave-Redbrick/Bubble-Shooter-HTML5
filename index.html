<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble Shooter Game</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div class="game-container">
      <div class="top-bar">
        <div class="score-box">
          <div class="score-label">SCORE</div>
          <div class="score-value" id="current-score">0</div>
        </div>
        <div class="level-indicator">
          <div class="level-circle">
            <span id="current-level">1</span>
          </div>
        </div>
        <div class="high-score-box">
          <div class="high-score-label">HIGH SCORE</div>
          <div class="high-score-value" id="high-score">0</div>
        </div>
        <div class="menu-button">
          <span>MENU</span>
        </div>
      </div>

      <div class="game-area">
        <canvas id="viewport"></canvas>
        <div class="game-items">
          <div class="item-slot" id="item1">
            <span>ITEM 1</span>
          </div>
          <div class="item-slot" id="item2">
            <span>ITEM 2</span>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
